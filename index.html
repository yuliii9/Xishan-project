<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>иҘҝеұұз”»еұҸ В· е°ҪеңЁиҘҝеұұз”»еұҸ</title>
<style>
  :root{
    --ink:#1b211e;
    --paper:#efe9da;
    --paper-dim:#d9d2c0;
    --seal:#b5392b;
    --gold:#c9aa63;
    --accent:#82a08a;

    --font-brush:'STKaiti','Kaiti SC','KaiTi','еҚҺж–ҮжҘ·дҪ“','BiauKai','Noto Serif CJK SC','Songti SC','STSong','SimSun',serif;
    --font-song:'Songti SC','STSong','SimSun','Noto Serif CJK SC','Source Han Serif SC',serif;

    --fs-title:clamp(1.7rem,4.8vw,3.5rem);
    --fs-eyebrow:clamp(.78rem,1.6vw,1.02rem);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--ink);color:var(--paper);font-family:var(--font-song);overflow:hidden;
    overscroll-behavior:none;-webkit-font-smoothing:antialiased}

  .screen{position:fixed;inset:0;overflow:hidden}

  /* иғҢжҷҜеұұжҷҜпјҲд»…еңЁжҚўзҜҮж—¶жёҗйҡҗеҲҮжҚўпјү */
  .scenes{position:absolute;inset:0;transform:scale(1.06);transition:transform .35s ease-out;z-index:0}
  .scene{position:absolute;inset:0;opacity:0;transition:opacity 1.3s ease;background-size:cover;background-position:center}
  .scene.active{opacity:1}
  .scene svg{width:100%;height:100%;display:block}

  /* жһҒж·Ўз©әж°”зІ’еӯҗ */
  .particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
  .p{position:absolute;top:0;left:0}
  @keyframes pfall{0%{transform:translate3d(0,-15vh,0) rotate(0)}10%{opacity:.85}90%{opacity:.85}100%{transform:translate3d(var(--sx,0),115vh,0) rotate(var(--rot,200deg));opacity:0}}
  @keyframes prise{0%{transform:translate3d(0,115vh,0) scale(.8);opacity:0}16%{opacity:.8}84%{opacity:.8}100%{transform:translate3d(var(--sx,0),-15vh,0) scale(1);opacity:0}}
  @keyframes pdrift{0%{transform:translate3d(-32vw,0,0);opacity:0}14%{opacity:.5}86%{opacity:.5}100%{transform:translate3d(122vw,0,0);opacity:0}}
  .particles.mote  .p{opacity:0;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.65);filter:blur(1px);animation:prise calc(12s + 9s*var(--t,.5)) linear infinite}
  .particles.dust  .p{opacity:0;width:5px;height:5px;border-radius:50%;background:rgba(245,224,188,.7);filter:blur(1px);animation:prise calc(13s + 9s*var(--t,.5)) linear infinite}
  .particles.leaf  .p{opacity:0;width:11px;height:6px;border-radius:60% 40% 55% 45%;background:linear-gradient(120deg,#8aac6c,#4f7142);animation:pfall calc(10s + 8s*var(--t,.5)) linear infinite}
  .particles.spark .p{opacity:0;width:6px;height:6px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#ffe9bd,#ff9a44);box-shadow:0 0 9px 2px rgba(255,170,80,.5);animation:prise calc(8s + 7s*var(--t,.5)) linear infinite}
  .particles.cloud .p{opacity:0;width:170px;height:48px;border-radius:50%;background:rgba(255,255,255,.45);filter:blur(15px);animation:pdrift calc(28s + 22s*var(--t,.5)) linear infinite}

  /* жҠҳеҸ з”»еұҸеҲҶеұҸпјҲжҚўзҜҮж—¶жіӣиө·ж¶ҹжјӘпјү */
  .panels{position:absolute;inset:0;display:flex;z-index:2;pointer-events:none;perspective:1700px}
  .panel{flex:1;height:100%;transform-origin:left center;backface-visibility:hidden;
    border-right:1px solid rgba(201,170,99,.07);
    background:linear-gradient(90deg,rgba(0,0,0,.035),rgba(255,255,255,.012) 50%,rgba(0,0,0,.04));
    transform:rotateY(-92deg);opacity:0;
    transition:transform 1.05s cubic-bezier(.2,.7,.2,1),opacity .8s ease}
  .panel:last-child{border-right:none}
  .panels.open .panel{transform:rotateY(0);opacity:1;transition-delay:calc(var(--i)*.085s)}
  @keyframes turn{0%,100%{transform:rotateY(0);filter:brightness(1)}44%{transform:rotateY(-10deg);filter:brightness(1.18)}}
  .panels.turn .panel{animation:turn .85s ease;animation-delay:calc(var(--i)*.05s)}

  .scrim{position:absolute;inset:0;z-index:3;pointer-events:none;
    background:
      radial-gradient(125% 88% at 50% 55%,rgba(20,24,20,0) 34%,rgba(17,21,18,.58) 100%),
      linear-gradient(180deg,rgba(15,18,15,.34) 0%,rgba(15,18,15,0) 24%,rgba(15,18,15,0) 60%,rgba(13,16,13,.46) 100%)}

  .grain{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:.045;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
    background-size:180px 180px}

  .brand{position:absolute;top:clamp(20px,3.4vw,36px);left:clamp(20px,4vw,52px);z-index:4;
    display:flex;align-items:center;gap:12px;font-family:var(--font-brush);
    font-size:clamp(1rem,2.2vw,1.32rem);letter-spacing:.16em;
    opacity:0;transition:opacity 1s ease;text-shadow:0 1px 12px rgba(0,0,0,.5)}
  body.ready .brand{opacity:.95;transition-delay:.3s}
  .seal{display:grid;place-items:center;width:2.1em;height:2.1em;border-radius:7px;
    background:linear-gradient(150deg,#c5402f,#9c2f24);color:var(--paper);font-size:.84em;transform:rotate(-4deg);
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.22),0 4px 14px rgba(150,40,30,.35);text-shadow:0 1px 1px rgba(0,0,0,.25)}

  /* еұ…дёӯж–Үеӯ—еҢә */
  .hero{position:absolute;inset:0;display:grid;place-items:center;padding:0 clamp(24px,6vw,72px);text-align:center}
  .hero-inner{opacity:0;transform:translateY(16px);transition:opacity .95s ease,transform .95s cubic-bezier(.2,.7,.2,1)}
  body.ready .hero-inner{opacity:1;transform:none;transition-delay:.5s}

  /* зҜҮз« зңүж Ү */
  .eyebrow{display:inline-flex;align-items:center;gap:.6em;margin-bottom:clamp(12px,1.8vw,20px);
    font-family:var(--font-song);font-size:var(--fs-eyebrow);letter-spacing:.32em;color:var(--paper-dim);
    text-shadow:0 1px 10px rgba(0,0,0,.55);transition:opacity .32s ease,transform .32s ease;min-height:1.2em}
  .eyebrow.out{opacity:0;transform:translateY(6px)}
  .eyebrow::before,.eyebrow::after{content:"";width:clamp(16px,3vw,34px);height:1px;background:linear-gradient(90deg,transparent,var(--accent));opacity:.7}
  .eyebrow::after{background:linear-gradient(90deg,var(--accent),transparent)}

  .title{display:flex;align-items:flex-end;justify-content:center;flex-wrap:wrap;
    font-family:var(--font-brush);font-weight:600;font-size:var(--fs-title);line-height:1.14;letter-spacing:.02em;
    color:var(--paper);text-shadow:0 2px 28px rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.45)}
  .rot{position:relative;display:inline-block;height:1.14em;overflow:hidden;text-align:right;vertical-align:bottom}
  .roll-item{position:absolute;right:0;bottom:0;white-space:nowrap;line-height:1.14;
    transition:transform .72s cubic-bezier(.22,.61,.36,1),opacity .72s ease;will-change:transform,opacity}
  .tail{display:inline-flex;align-items:flex-end;line-height:1.14;white-space:nowrap}
  .mid{color:var(--seal);margin:0 .04em 0 .12em;font-weight:500;text-shadow:0 0 18px rgba(181,57,43,.5),0 1px 2px rgba(0,0,0,.4)}
  .fixed{color:var(--paper);opacity:.94;padding-left:.16em}

  /* еҸідҫ§зҜҮз« зҙўеј• */
  .rail{position:absolute;top:50%;right:clamp(16px,3vw,40px);transform:translateY(-50%);z-index:4;
    display:flex;flex-direction:column;gap:clamp(13px,2vw,21px);opacity:0;transition:opacity 1s ease}
  body.ready .rail{opacity:1;transition-delay:.6s}
  .railitem{display:flex;align-items:center;justify-content:flex-end;gap:9px;background:none;border:none;
    cursor:pointer;padding:3px 0;color:var(--paper)}
  .rdots{display:flex;gap:5px;align-items:center;width:0;overflow:hidden;opacity:0;transition:opacity .4s ease}
  .railitem.on .rdots{opacity:1;width:auto;margin-right:3px}
  .rdots i{width:5px;height:5px;border-radius:50%;background:rgba(239,233,218,.3);transition:all .3s ease}
  .rdots i.on{background:var(--accent);transform:scale(1.3)}
  .rnum{font-family:var(--font-brush);font-size:clamp(.78rem,1.4vw,.98rem);
    color:rgba(239,233,218,.42);transition:color .4s ease;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .rtick{width:18px;height:2px;border-radius:2px;background:rgba(239,233,218,.38);transition:all .45s ease}
  .railitem:hover .rnum{color:var(--paper)}
  .railitem:hover .rtick{width:26px;background:rgba(239,233,218,.7)}
  .railitem.on .rnum{color:var(--paper)}
  .railitem.on .rtick{width:34px;background:var(--accent);box-shadow:0 0 10px var(--accent)}
  .railitem:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:3px}

  .scrollhint{position:absolute;bottom:clamp(22px,4vw,40px);left:50%;transform:translateX(-50%);z-index:4;
    display:flex;align-items:center;gap:11px;color:rgba(239,233,218,.62);font-family:var(--font-song);
    font-size:clamp(.74rem,1.4vw,.9rem);letter-spacing:.24em;opacity:0;transition:opacity .8s ease}
  body.ready .scrollhint{opacity:.7;transition-delay:1s}
  .scrollhint.hide{opacity:0!important;pointer-events:none}
  .wheel{width:18px;height:28px;border:1.5px solid rgba(239,233,218,.55);border-radius:10px;position:relative;flex:none}
  .wheel::after{content:"";position:absolute;left:50%;top:6px;width:2px;height:6px;border-radius:2px;
    background:rgba(239,233,218,.75);transform:translateX(-50%);animation:wheelmove 1.7s ease infinite}
  @keyframes wheelmove{0%{opacity:0;top:6px}30%{opacity:1}62%{opacity:1;top:14px}100%{opacity:0;top:14px}}

  .measure{position:absolute;left:-9999px;top:0;visibility:hidden;white-space:nowrap;
    font-family:var(--font-brush);font-weight:600;font-size:var(--fs-title);letter-spacing:.02em;line-height:1.14}
  .vh{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

  @media (max-width:640px){
    .rail{top:auto;bottom:62px;right:50%;transform:translateX(50%);flex-direction:row;gap:16px}
    .railitem{flex-direction:column;gap:5px}
    .rdots{display:none}
    .rtick{width:16px}.railitem.on .rtick{width:24px}
    .scrollhint{bottom:16px}
  }
  @media (prefers-reduced-motion: reduce){
    .roll-item,.eyebrow,.panel,.scene,.scenes,.brand,.hero-inner,.rail,.scrollhint{transition:none!important;animation:none!important}
    .particles{display:none}
    .panels .panel{transform:none;opacity:1}
    .wheel::after{animation:none}
  }
</style>
</head>
<body>
  <div class="screen" id="screen">
    <div class="scenes" id="scenes"></div>
    <div class="particles" id="particles"></div>
    <div class="panels" id="panels"></div>
    <div class="scrim"></div>

    <div class="brand"><span class="seal">з”»</span><span>иҘҝеұұз”»еұҸ</span></div>

    <main class="hero">
      <div class="hero-inner">
        <p class="eyebrow" id="eyebrow"></p>
        <div class="title">
          <span class="rot" id="rot"></span>
          <span class="tail"><span class="mid">В·</span><span class="fixed">е°ҪеңЁиҘҝеұұз”»еұҸ</span></span>
        </div>
      </div>
    </main>

    <nav class="rail" id="rail" aria-label="зҜҮз« еҜјиҲӘ"></nav>

    <div class="scrollhint" id="scrollhint"><span class="wheel"></span><span>ж»ҡеҠЁзҝ»йҳ…</span></div>
  </div>

  <div class="grain"></div>
  <span class="measure" id="measure"></span>

<script>
/* ============================================================
   дә”зҜҮеҶ…е®№ вҖ”вҖ” жҜҸзҜҮ title + items е…ЁйғЁиҝӣе…Ҙж»ҡеҠЁйҳҹеҲ—пјҲе…ұ 20 жқЎпјүгҖӮ
   иғҢжҷҜжҢү"зҜҮ"еҲҮжҚўпјҡеҗҢдёҖзҜҮеҶ…зҝ»еӯҗйЎ№иғҢжҷҜдёҚеҠЁпјҢжҚўзҜҮжүҚжҚўжҷҜгҖӮ
   иҰҒж”№ж–Үеӯ— / еўһеҲ  / жҚўз…§зүҮиғҢжҷҜ(еЎ« image)пјҢйғҪж”№иҝҷйҮҢгҖӮ
   ============================================================ */
const GROUPS = [
  { title:'еҚҒдәҢеә§зІҫзҘһй©ҝз«ҷ', items:['йҹід№җи°·й©ҝз«ҷ','еҰҷеі°еҸӨйҒ“й©ҝз«ҷ','еӨ§и§үеҜәжёёе®ўдёӯеҝғй©ҝз«ҷ'], num:'еЈ№',
    sky:['#dde7dd','#a9bcae','#5d7466'], ridges:['#aabcae','#88a093','#647f6e','#46604f'],
    sun:'#eff3ec', sunX:1150, sunY:222, sunR:80, accent:'#82a08a', particle:'mote', key:'station', image:null },

  { title:'9KMиҘҝеұұеҚҡзү©еҫ„', items:['иҙқе®¶иҠұеӣӯ','еңЈзҗјдҪ©ж–Ҝж•…еұ…','еӨ§и§үеҜәеҚҡзү©йҷў'], num:'иҙ°',
    sky:['#ece3d2','#cbb393','#7d6750'], ridges:['#c3ad8f','#a88f6f','#85704f','#5d4d36'],
    sun:'#f6ead0', sunX:400, sunY:215, sunR:78, accent:'#b59a6d', particle:'dust', key:'museum', image:null },

  { title:'еӨҡзә§з”»еұҸеҠЁзәҝ', items:['з»Ҹе…ёеҫ’жӯҘзәҝ','еұұи„ҠжҢ‘жҲҳзәҝ','дәІеӯҗжҺўзҙўзәҝ'], num:'еҸҒ',
    sky:['#cfe0c1','#82a079','#3c5942'], ridges:['#7e9a72','#5f7d56','#456042','#2c4230'],
    sun:'#e6f0cf', sunX:1130, sunY:205, sunR:82, accent:'#5d7e4f', particle:'leaf', key:'routes', image:null },

  { title:'йЈҹе®ҝиҘҝеұұиҒҡиҗҪ', items:['еӨ§и§үеҜәе®ҝйҷў','еӨ§и§үеҜәеёҢе°”йЎҝй…’еә—','жІҗеҝғеұұеұ…е®ҝйӣҶ'], num:'иӮҶ',
    sky:['#f3d6b4','#dd9d76','#7e4a4a'], ridges:['#cf9a72','#b3744f','#8c5039','#5f352c'],
    sun:'#ffdca8', sunX:1170, sunY:225, sunR:90, accent:'#e09a5c', particle:'spark', key:'lodging', image:null },

  { title:'еұұиҒҡеңә', items:['йҹід№җи°·ж¬ўд№җиҒҡеңә','йҳіеҸ°еұұеұұжһ—иҒҡеңә','еӨ§и§үеҜәж–ҮеҢ–иҒҡеңә'], num:'дјҚ',
    sky:['#cdd9e0','#88a0ad','#42596a'], ridges:['#9fb0bc','#7790a0','#566f7f','#374a57'],
    sun:'#eef3f6', sunX:1180, sunY:200, sunR:92, accent:'#6f8aa0', particle:'cloud', key:'venues', image:null },
];
const CN=['дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','дёғ','е…«','д№қ','еҚҒ'];

/* жҠҠжүҖжңүж–Үеӯ—ж‘Ҡе№іжҲҗж»ҡеҠЁйҳҹеҲ— */
const STEPS=[]; const groupStart=[];
GROUPS.forEach((g,gi)=>{
  groupStart[gi]=STEPS.length;
  STEPS.push({text:g.title, gi, local:0, isTitle:true});
  g.items.forEach((it,j)=>STEPS.push({text:it, gi, local:j+1, isTitle:false}));
});

/* ---------- ж°ҙеўЁеұұжҷҜпјҲжһҒз®Җз•ҷзҷҪпјү ---------- */
const RB="M0,470 C150,430 260,398 380,420 C520,446 600,358 760,380 C900,400 980,330 1140,360 C1280,384 1380,412 1600,378 L1600,900 L0,900 Z";
const RM="M0,560 C180,520 300,562 440,540 C560,522 660,468 820,500 C980,532 1060,478 1220,520 C1360,556 1460,538 1600,560 L1600,900 L0,900 Z";
const RF="M0,684 C160,642 280,694 420,672 C600,646 720,704 880,690 C1040,678 1140,648 1300,690 C1420,722 1500,700 1600,688 L1600,900 L0,900 Z";
const RN="M0,802 C200,772 360,812 520,800 C720,786 820,822 1000,816 C1180,810 1280,788 1460,816 C1540,828 1580,814 1600,814 L1600,900 L0,900 Z";
const mist=(cx,cy,rx,ry,o,i)=>`<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="#fff" opacity="${o}" filter="url(#blur${i})"/>`;

function makeScene(v,i){
  const [s0,s1,s2]=v.sky,[r0,r1,r2,r3]=v.ridges, k=v.key;
  let bgExtra='', mid='', front='';
  if(k==='station'){
    const x=1090,y=536, ink='#3c4a40';
    mid=`<g fill="${ink}" opacity="0.5"><path d="M${x-26},${y} Q${x},${y-22} ${x+26},${y} L${x+20},${y+3} Q${x},${y-12} ${x-20},${y+3} Z"/>
      <rect x="${x-15}" y="${y+2}" width="3" height="20"/><rect x="${x+12}" y="${y+2}" width="3" height="20"/>
      <rect x="${x-26}" y="${y+22}" width="52" height="3"/><rect x="${x-1}" y="${y-30}" width="2" height="9"/></g>`;
  } else if(k==='museum'){
    const x=460,y=556, ink='#5a4636';
    mid=`<g fill="${ink}" opacity="0.52"><rect x="${x-20}" y="${y-2}" width="40" height="26"/>
      <path d="M${x-26},${y} L${x},${y-22} L${x+26},${y} Z"/><rect x="${x+8}" y="${y-20}" width="6" height="14"/></g>
      <path d="M${x},${y+24} C${x-60},${y+90} ${x-30},${y+150} ${x-150},${y+210}" stroke="#efe4cf" stroke-width="3" fill="none" opacity="0.28" stroke-dasharray="2 14" stroke-linecap="round"/>`;
  } else if(k==='routes'){
    front=`<path d="M820,880 C760,760 900,700 840,600 C800,532 920,500 880,430 C860,392 940,372 980,330" stroke="#e7f0d2" stroke-width="3.5" fill="none" opacity="0.5" stroke-dasharray="3 15" stroke-linecap="round"/>`;
  } else if(k==='lodging'){
    let houses=''; const base=652;
    for(let n=0;n<5;n++){
      const x=720+n*42+((n*17)%9), y=base+Math.sin(n*1.3)*8, ink='#4a2f28';
      houses+=`<g><rect x="${x}" y="${y}" width="22" height="16" fill="${ink}"/><path d="M${x-3},${y} L${x+11},${y-11} L${x+25},${y} Z" fill="${ink}"/><circle cx="${x+11}" cy="${y+8}" r="2.4" fill="#ffd49a"/></g>`;
    }
    mid=`<ellipse cx="800" cy="700" rx="360" ry="70" fill="#ffce86" opacity="0.12" filter="url(#blur${i})"/>`+houses;
  } else if(k==='venues'){
    [[300,310],[600,260],[940,300],[1260,255]].forEach(p=>{bgExtra+=`<path d="M${p[0]-160},470 L${p[0]},${p[1]} L${p[0]+160},470 Z" fill="#aebcc7" opacity="0.45"/>`;});
    front=mist(700,640,560,64,0.2,i)+mist(300,690,320,52,0.18,i)+mist(1240,700,360,56,0.18,i);
  }
  const haze=mist(360,548,360,58,0.22,i)+mist(1080,568,420,64,0.22,i)+mist(720,640,520,66,0.2,i)+mist(300,684,300,52,0.18,i)+mist(1240,694,340,56,0.18,i);
  return `<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="sky${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${s0}"/><stop offset="0.52" stop-color="${s1}"/><stop offset="1" stop-color="${s2}"/></linearGradient>
      <radialGradient id="sun${i}" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="${v.sun}" stop-opacity="0.85"/><stop offset="60%" stop-color="${v.sun}" stop-opacity="0.2"/><stop offset="100%" stop-color="${v.sun}" stop-opacity="0"/></radialGradient>
      <filter id="blur${i}" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="18"/></filter>
      <linearGradient id="haze${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${s0}" stop-opacity="0"/><stop offset="1" stop-color="${s0}" stop-opacity="0.3"/></linearGradient>
    </defs>
    <rect width="1600" height="900" fill="url(#sky${i})"/>
    <circle cx="${v.sunX}" cy="${v.sunY}" r="${v.sunR*1.9}" fill="url(#sun${i})"/>
    <circle cx="${v.sunX}" cy="${v.sunY}" r="${v.sunR}" fill="${v.sun}" opacity="0.82"/>
    ${bgExtra}
    <path d="${RB}" fill="${r0}" opacity="0.78"/>
    ${mist(800,500,720,86,0.2,i)}
    <path d="${RM}" fill="${r1}" opacity="0.9"/>
    ${mid}
    <path d="${RF}" fill="${r2}"/>
    ${haze}
    <path d="${RN}" fill="${r3}"/>
    ${front}
    <rect width="1600" height="900" fill="url(#haze${i})"/>
  </svg>`;
}

/* ---------- жһ„е»ә ---------- */
const screen=document.getElementById('screen');
const scenesEl=document.getElementById('scenes');
const pLayer=document.getElementById('particles');
const panelsEl=document.getElementById('panels');
const railEl=document.getElementById('rail');
const rot=document.getElementById('rot');
const eyebrow=document.getElementById('eyebrow');
const measure=document.getElementById('measure');
const scrollhint=document.getElementById('scrollhint');
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;

const sceneEls=[], railItems=[];
GROUPS.forEach((g,gi)=>{
  const sc=document.createElement('div'); sc.className='scene';
  if(g.image){ sc.style.backgroundImage=`url("${g.image}")`; } else { sc.innerHTML=makeScene(g,gi); }
  scenesEl.appendChild(sc); sceneEls.push(sc);

  const r=document.createElement('button'); r.className='railitem'; r.type='button';
  r.setAttribute('aria-label',`з¬¬${CN[gi]}зҜҮ ${g.title}`);
  const n=1+g.items.length; let dots=''; for(let j=0;j<n;j++) dots+='<i></i>';
  r.innerHTML=`<span class="rdots">${dots}</span><span class="rnum">${g.num}</span><span class="rtick"></span>`;
  r.addEventListener('click',()=>jumpGroup(gi));
  railEl.appendChild(r); railItems.push(r);
});

const PANELS=7;
for(let k=0;k<PANELS;k++){ const pn=document.createElement('div'); pn.className='panel'; pn.style.setProperty('--i',k); panelsEl.appendChild(pn); }

const rnd=(a,b)=>a+Math.random()*(b-a);
for(let k=0;k<9;k++){
  const p=document.createElement('span'); p.className='p';
  p.style.left=rnd(0,100).toFixed(1)+'%'; p.style.top=rnd(2,46).toFixed(1)+'%';
  p.style.setProperty('--t',Math.random().toFixed(3));
  p.style.setProperty('--sx',rnd(-5,5).toFixed(1)+'vw');
  p.style.setProperty('--rot',Math.round(rnd(120,380))+'deg');
  p.style.animationDelay='-'+rnd(0,24).toFixed(1)+'s';
  pLayer.appendChild(p);
}

/* ---------- ж–Үеӯ—еҚ·еҠЁпјҲж–№еҗ‘и·ҹйҡҸж»ҡиҪ®пјү ---------- */
let curItem=null;
function setRotInstant(text){
  rot.innerHTML='';
  const it=document.createElement('span'); it.className='roll-item'; it.textContent=text;
  it.style.transform='translateY(0)'; it.style.opacity='1';
  rot.appendChild(it); curItem=it;
}
function rollTo(text,dir){
  if(reduce){ if(curItem) curItem.textContent=text; return; }
  const fromY=dir>0?'108%':'-108%', outY=dir>0?'-115%':'115%';
  const nxt=document.createElement('span'); nxt.className='roll-item'; nxt.textContent=text;
  nxt.style.transform=`translateY(${fromY})`; nxt.style.opacity='0';
  rot.appendChild(nxt); void nxt.offsetWidth;
  const old=curItem;
  if(old){ old.style.transform=`translateY(${outY})`; old.style.opacity='0'; }
  nxt.style.transform='translateY(0)'; nxt.style.opacity='1';
  curItem=nxt;
  setTimeout(()=>{ if(old&&old.parentNode) old.remove(); },820);
}
function swapEyebrow(text){
  if(reduce){ eyebrow.textContent=text; return; }
  eyebrow.classList.add('out');
  setTimeout(()=>{ eyebrow.textContent=text; eyebrow.classList.remove('out'); },320);
}
function triggerTurn(){ if(reduce) return; panelsEl.classList.remove('turn'); void panelsEl.offsetWidth; panelsEl.classList.add('turn'); }

function measureSlot(){
  let max=0; STEPS.forEach(s=>{ measure.textContent=s.text; max=Math.max(max,measure.offsetWidth); });
  rot.style.width=(max+4)+'px';
}

/* ---------- зҝ»еҠЁйҖ»иҫ‘ ---------- */
let stepIdx=0, curGroup=0;
function render(dir){
  const st=STEPS[stepIdx], g=GROUPS[st.gi];
  rollTo(st.text,dir);
  swapEyebrow(st.isTitle ? ('з¬¬'+CN[st.gi]+'зҜҮ') : g.title);
  if(st.gi!==curGroup){                 // жҚўзҜҮпјҡжүҚжҚўиғҢжҷҜ / ж¶ҹжјӘ / зІ’еӯҗ / иүІи°ғ
    sceneEls.forEach((el,i)=>el.classList.toggle('active',i===st.gi));
    screen.style.setProperty('--accent',g.accent);
    pLayer.className='particles '+g.particle;
    triggerTurn();
    curGroup=st.gi;
  }
  railItems.forEach((b,i)=>b.classList.toggle('on',i===st.gi));
  railItems.forEach((b,gi)=>b.querySelectorAll('.rdots i').forEach((d,j)=>d.classList.toggle('on',gi===st.gi && j===st.local)));
}
function goTo(i,dir){ stepIdx=(i%STEPS.length+STEPS.length)%STEPS.length; render(dir); }

let lock=false, acc=0;
const STEP=50, COOL=700;
function hideHint(){ scrollhint.classList.add('hide'); }
function step(dir){ if(lock) return; lock=true; hideHint(); goTo(stepIdx+dir,dir); setTimeout(()=>{lock=false; acc=0;},COOL); }
function jumpGroup(gi){ if(lock||gi===curGroup) return; lock=true; hideHint(); goTo(groupStart[gi], gi>curGroup?1:-1); setTimeout(()=>{lock=false; acc=0;},COOL); }

addEventListener('wheel',e=>{
  e.preventDefault();
  if(lock) return;
  acc+=e.deltaY;
  if(Math.abs(acc)>=STEP){ const dir=acc>0?1:-1; acc=0; step(dir); }
},{passive:false});

let ty=0;
addEventListener('touchstart',e=>{ ty=e.touches[0].clientY; },{passive:true});
addEventListener('touchmove',e=>{ e.preventDefault(); },{passive:false});
addEventListener('touchend',e=>{ const dy=ty-e.changedTouches[0].clientY; if(Math.abs(dy)>42) step(dy>0?1:-1); });

addEventListener('keydown',e=>{
  if(['ArrowDown','ArrowRight','PageDown',' '].includes(e.key)){ e.preventDefault(); step(1); }
  else if(['ArrowUp','ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); step(-1); }
});

if(!reduce && matchMedia('(pointer:fine)').matches){
  addEventListener('pointermove',e=>{
    const x=e.clientX/innerWidth-.5, y=e.clientY/innerHeight-.5;
    scenesEl.style.transform=`scale(1.06) translate(${x*-13}px,${y*-9}px)`;
    pLayer.style.transform=`translate(${x*-24}px,${y*-15}px)`;
  });
}
let rt; addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(measureSlot,150); });

/* ---------- еҗҜеҠЁ ---------- */
measureSlot();
setRotInstant(STEPS[0].text);
eyebrow.textContent='з¬¬дёҖзҜҮ';
sceneEls[0].classList.add('active');
pLayer.className='particles '+GROUPS[0].particle;
railItems[0].classList.add('on');
railItems[0].querySelectorAll('.rdots i')[0].classList.add('on');
screen.style.setProperty('--accent',GROUPS[0].accent);

requestAnimationFrame(()=>panelsEl.classList.add('open'));
setTimeout(()=>document.body.classList.add('ready'),200);
</script>
</body>
</html>
